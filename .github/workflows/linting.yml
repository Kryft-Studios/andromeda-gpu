name: "Andromeda Linting"

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  list-packages:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - id: set-matrix
        run: |
          dirs=$(find packages -name "eslint.config.js" -not -path "*/node_modules/*" -exec dirname {} \;)
          json=$(echo "$dirs" | jq -R . | jq -s -c .)
          echo "matrix=$json" >> $GITHUB_OUTPUT

  lint:
    needs: list-packages
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package: ${{ fromJson(needs.list-packages.outputs.matrix) }}
    
    defaults:
      run:
        working-directory: ${{ matrix.package }}

    steps:
      - uses: actions/checkout@v4
      
      - name: "Setup Node"
        uses: actions/setup-node@v4
        with:
          node-version: 24 

      - name: "Setup pnpm"
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: "Install Dependencies"
        run: pnpm install

      - name: "Run Linting"
        run: pnpm run lint